services:

  postgres:
    image: postgres:15
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./init-db.sql:/docker-entrypoint-initdb.d/init-db.sql
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 10

  kafka:
    image: apache/kafka:3.7.0
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_LISTENERS: PLAINTEXT://:9092,CONTROLLER://:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,CONTROLLER:PLAINTEXT
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      CLUSTER_ID: "4L6g3nShT-eMCtK--X86sw"
    ports:
      - "9092:9092"
    healthcheck:
      test: ["CMD-SHELL", "/opt/kafka/bin/kafka-broker-api-versions.sh --bootstrap-server localhost:9092"]
      interval: 10s
      timeout: 10s
      retries: 10

  user-service:
    build: ./user-service
    ports:
      - "3001:3001"
    environment:
      DATABASE_URL: postgresql://postgres:password@postgres:5432/userdb
      JWT_SECRET: supersecretkey
      PORT: 3001
    depends_on:
      postgres:
        condition: service_healthy
    command: sh -c "npx prisma migrate deploy && npm start"

  product-service:
    build: ./product-service
    ports:
      - "3002:3002"
    environment:
      DATABASE_URL: postgresql://postgres:password@postgres:5432/productdb
      JWT_SECRET: supersecretkey
      PORT: 3002
    depends_on:
      postgres:
        condition: service_healthy
    command: sh -c "npx prisma migrate deploy && npx prisma db seed && npm start"

  order-service:
    build: ./order-service
    ports:
      - "3003:3003"
    environment:
      DATABASE_URL: postgresql://postgres:password@postgres:5432/orderdb
      JWT_SECRET: supersecretkey
      PORT: 3003
      PRODUCT_SERVICE_URL: http://product-service:3002
      KAFKA_BROKER: kafka:9092
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_healthy
      product-service:
        condition: service_started
    command: sh -c "npx prisma migrate deploy && npm start"

  notification-service:
    build: ./notification-service
    environment:
      KAFKA_BROKER: kafka:9092
    depends_on:
      kafka:
        condition: service_healthy

  review-service:
    build: ./review-service
    ports:
      - "3004:3004"
    environment:
      DATABASE_URL: postgresql://postgres:password@postgres:5432/reviewdb
      JWT_SECRET: supersecretkey
      PORT: 3004
      ORDER_SERVICE_URL: http://order-service:3003
    depends_on:
      postgres:
        condition: service_healthy
      order-service:
        condition: service_started
    command: sh -c "npx prisma migrate deploy && npm start"

  api-gateway:
    build: ./api-gateway
    ports:
      - "3000:3000"
    environment:
      PORT: 3000
      USER_SERVICE_URL: http://user-service:3001
      PRODUCT_SERVICE_URL: http://product-service:3002
      ORDER_SERVICE_URL: http://order-service:3003
      REVIEW_SERVICE_URL: http://review-service:3004
    depends_on:
      - user-service
      - product-service
      - order-service
      - review-service

volumes:
  postgres-data:
